spring.application.name=hotel-management
spring.profiles.active=dev
spring.config.import=optional:file:${user.dir}/.env[.properties]

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_management_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=this-is-a-development-jwt-secret-key-with-at-least-sixty-four-bytes-length-2026-strong
jwt.expiration=${JWT_EXPIRATION:86400000}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_key_secret}
payment.mock-signature-enabled=${PAYMENT_MOCK_SIGNATURE_ENABLED:false}

# Auth
auth.dev.plaintext-fallback-enabled=false
auth.allow-public-admin-register=false
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID:your_account_sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your_auth_token}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}

# Email (Optional SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP
otp.expiry-seconds=${OTP_EXPIRY_SECONDS:300}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
otp.mail.from=${OTP_MAIL_FROM:${spring.mail.username}}
otp.mail.subject=${OTP_MAIL_SUBJECT:Vital verification code}
otp.cleanup.interval-ms=${OTP_CLEANUP_INTERVAL_MS:300000}
password.reset.otp.expiry-seconds=${PASSWORD_RESET_OTP_EXPIRY_SECONDS:300}
password.reset.otp.max-attempts=${PASSWORD_RESET_OTP_MAX_ATTEMPTS:5}
password.reset.otp.cooldown-seconds=${PASSWORD_RESET_OTP_COOLDOWN_SECONDS:60}
password.reset.otp.window-seconds=${PASSWORD_RESET_OTP_WINDOW_SECONDS:900}
password.reset.otp.max-requests-per-window=${PASSWORD_RESET_OTP_MAX_REQUESTS_PER_WINDOW:5}
password.reset.otp.max-requests-per-ip-window=${PASSWORD_RESET_OTP_MAX_REQUESTS_PER_IP_WINDOW:20}
password.reset.mail.subject=${PASSWORD_RESET_MAIL_SUBJECT:Vital password reset code}
booking.mail.from=${BOOKING_MAIL_FROM:${spring.mail.username}}
booking.mail.subject=${BOOKING_MAIL_SUBJECT:Vital Stays booking confirmation}
support.mail.to=${SUPPORT_MAIL_TO:support@vitalstays.com}
support.mail.from=${SUPPORT_MAIL_FROM:${spring.mail.username}}
support.mail.subject-prefix=${SUPPORT_MAIL_SUBJECT_PREFIX:[Vital Stays Support]}

# Logging
logging.level.root=INFO
logging.level.com.hotel.management=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS
cors.allowed.origins=http://localhost:3000,http://localhost:5500
